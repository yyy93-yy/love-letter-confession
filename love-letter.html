<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💕 星空表白信 💕</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 50%, #0a1a2e 100%);
            overflow: hidden;
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            color: #fff;
        }
        #starsCanvas, #heartsCanvas, #fireworksCanvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;
        }
        #starsCanvas { z-index: 0; }
        #heartsCanvas { z-index: 1; }
        #fireworksCanvas { z-index: 100; display: none; }
        
        .glass-card {
            position: relative; z-index: 10;
            width: 90%; max-width: 500px; margin: 8% auto;
            padding: 40px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 40px rgba(255, 100, 200, 0.3), 0 0 80px rgba(150, 100, 255, 0.2), inset 0 0 60px rgba(255, 255, 255, 0.05);
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .glass-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 0 60px rgba(255, 100, 200, 0.4), 0 0 100px rgba(150, 100, 255, 0.3), inset 0 0 80px rgba(255, 255, 255, 0.08);
        }
        .glass-card::before {
            content: ''; position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px;
            border-radius: 26px;
            background: linear-gradient(45deg, #ff6b9d, #c084fc, #60a5fa, #ff6b9d);
            background-size: 400% 400%; z-index: -1;
            animation: borderGlow 4s ease infinite; opacity: 0.7;
        }
        @keyframes borderGlow { 0%,100%{background-position:0% 50%;} 50%{background-position:100% 50%;} }
        
        .title {
            font-size: 28px; font-weight: bold;
            background: linear-gradient(135deg, #ffc0cb, #e0aaff, #c4b5fd);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            text-shadow: 0 0 30px rgba(255, 100, 200, 0.5);
        }
        
        .name-input-container { margin: 20px 0; }
        .name-label {
            display: block; font-size: 14px; color: rgba(255,255,255,0.7); margin-bottom: 8px;
        }
        .name-input {
            width: 200px; padding: 12px 20px;
            border: 2px solid rgba(255, 100, 200, 0.5); border-radius: 30px;
            background: rgba(255, 255, 255, 0.1); color: #fff; font-size: 16px;
            text-align: center; outline: none;
            transition: all 0.3s ease;
        }
        .name-input:focus {
            border-color: #ff6b9d;
            box-shadow: 0 0 20px rgba(255, 100, 200, 0.4);
            background: rgba(255, 255, 255, 0.15);
        }
        
        .love-text {
            font-size: 18px; line-height: 1.8; color: rgba(255,255,255,0.9);
            margin: 30px 0; min-height: 100px;
        }
        .name-highlight {
            color: #ffd700; font-weight: bold;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.6); font-size: 20px;
        }
        
        .button-container {
            display: flex; gap: 20px; justify-content: center;
            margin-top: 30px; flex-wrap: wrap;
        }
        .btn {
            padding: 16px 36px; font-size: 18px; font-weight: bold;
            border: none; border-radius: 40px; cursor: pointer;
            transition: all 0.3s ease; position: relative;
        }
        .btn-accept {
            background: linear-gradient(135deg, #ff6b9d, #ff8fab); color: #fff;
            box-shadow: 0 4px 20px rgba(255, 107, 157, 0.5);
        }
        .btn-accept:hover { transform: translateY(-3px); box-shadow: 0 8px 30px rgba(255, 107, 157, 0.7); }
        .btn-think {
            background: linear-gradient(135deg, #60a5fa, #93c5fd); color: #fff;
            box-shadow: 0 4px 20px rgba(96, 165, 250, 0.5);
            transition: all 0.1s ease;
        }
        .btn-think:hover { transform: translateY(-3px); box-shadow: 0 8px 30px rgba(96, 165, 250, 0.7); }
        
        .coquetry-text {
            margin-top: 20px; font-size: 16px; color: #ffd700;
            opacity: 0; transition: opacity 0.3s ease;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }
        .coquetry-text.show { opacity: 1; }
        
        .love-days {
            position: fixed; right: 20px; bottom: 20px; z-index: 10;
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px);
            border-radius: 30px; font-size: 14px; color: #ffd700;
            border: 1px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
        }
        
        .success-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(10px);
            z-index: 200; display: none;
            flex-direction: column; justify-content: center; align-items: center;
        }
        .success-overlay.show { display: flex; }
        .success-text {
            font-size: 32px; font-weight: bold; text-align: center; margin-bottom: 30px;
            background: linear-gradient(135deg, #ffd700, #ff6b9d, #c084fc);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 0 40px rgba(255, 215, 0, 0.5);
            animation: successPulse 1s ease infinite;
        }
        @keyframes successPulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.05);} }
        .success-subtitle { font-size: 18px; color: rgba(255,255,255,0.8); }
        
        .petal {
            position: fixed; width: 20px; height: 20px;
            background: linear-gradient(135deg, #ff6b9d, #ff8fab);
            border-radius: 50% 0 50% 50%; z-index: 150;
            pointer-events: none; opacity: 0.8;
        }
        
        @keyframes petalFall {
            0% { transform: translateY(-30px) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        @media (max-width: 600px) {
            .glass-card { padding: 25px 20px; margin: 5% auto; }
            .title { font-size: 22px; }
            .love-text { font-size: 16px; }
            .btn { padding: 14px 28px; font-size: 16px; }
            .button-container { gap: 15px; }
            .love-days { right: 10px; bottom: 10px; padding: 10px 18px; font-size: 12px; }
            .success-text { font-size: 24px; padding: 0 20px; }
        }
    </style>
</head>
<body>
    <canvas id="starsCanvas"></canvas>
    <canvas id="heartsCanvas"></canvas>
    <canvas id="fireworksCanvas"></canvas>
    
    <div class="glass-card" id="mainCard">
        <h1 class="title">💕 星空下的告白 💕</h1>
        <div class="name-input-container">
            <label class="name-label">输入TA的名字：</label>
            <input type="text" class="name-input" id="nameInput" placeholder="请输入名字" maxlength="10" />
        </div>
        <div class="love-text" id="loveText">
            亲爱的<span class="name-highlight" id="nameDisplay">XXX</span>，<br/>
            从遇见你的那天起，<br/>
            我的世界开始发光。
        </div>
        <div class="button-container">
            <button class="btn btn-accept" id="acceptBtn">我愿意 ❤️</button>
            <button class="btn btn-think" id="thinkBtn">再想想 💭</button>
        </div>
        <div class="coquetry-text" id="coquetryText">不许跑~再考虑一下嘛 ✨</div>
    </div>
    
    <div class="love-days" id="loveDays">爱你的第 <span id="daysCount">131</span> 天</div>
    
    <div class="success-overlay" id="successOverlay">
        <div class="success-text">我就知道！我的世界圆满了！</div>
        <div class="success-subtitle">💖 愿我们永远在一起 💖</div>
    </div>

    <script>
        // 星空粒子背景
        class StarField {
            constructor(canvas) {
                this.canvas = canvas; this.ctx = canvas.getContext('2d');
                this.stars = []; this.mouseX = 0; this.mouseY = 0;
                this.resize(); this.initStars(); this.animate();
            }
            resize() { this.canvas.width = window.innerWidth; this.canvas.height = window.innerHeight; }
            initStars() {
                this.stars = [];
                const starCount = Math.floor((this.canvas.width * this.canvas.height) / 3000);
                for (let i = 0; i < starCount; i++) {
                    this.stars.push({
                        x: Math.random() * this.canvas.width, y: Math.random() * this.canvas.height,
                        radius: Math.random() * 2 + 0.5, speed: Math.random() * 0.5 + 0.1,
                        opacity: Math.random() * 0.8 + 0.2,
                        twinkleSpeed: Math.random() * 0.02 + 0.01,
                        twinklePhase: Math.random() * Math.PI * 2
                    });
                }
            }
            setMousePosition(x, y) { this.mouseX = x; this.mouseY = y; }
            animate() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                this.stars.forEach(star => {
                    const dx = this.mouseX - this.canvas.width / 2;
                    const dy = this.mouseY - this.canvas.height / 2;
                    const depth = star.radius * 20;
                    const offsetX = dx / depth; const offsetY = dy / depth;
                    
                    star.twinklePhase += star.twinkleSpeed;
                    const twinkle = Math.sin(star.twinklePhase) * 0.3 + 0.7;
                    const alpha = star.opacity * twinkle;
                    
                    this.ctx.beginPath();
                    this.ctx.arc(star.x + offsetX, star.y + offsetY, star.radius, 0, Math.PI * 2);
                    const gradient = this.ctx.createRadialGradient(
                        star.x + offsetX, star.y + offsetY, 0,
                        star.x + offsetX, star.y + offsetY, star.radius * 2
                    );
                    gradient.addColorStop(0, `rgba(255,255,255,${alpha})`);
                    gradient.addColorStop(0.5, `rgba(200,200,255,${alpha * 0.5})`);
                    gradient.addColorStop(1, 'rgba(100,100,200,0)');
                    this.ctx.fillStyle = gradient; this.ctx.fill();
                    
                    star.y -= star.speed;
                    if (star.y < -star.radius) { star.y = this.canvas.height + star.radius; star.x = Math.random() * this.canvas.width; }
                });
                requestAnimationFrame(() => this.animate());
            }
        }

        // 爱心气泡效果
        class HeartBubbles {
            constructor(canvas) {
                this.canvas = canvas; this.ctx = canvas.getContext('2d');
                this.hearts = []; this.resize(); this.initHearts(); this.animate();
            }
            resize() { this.canvas.width = window.innerWidth; this.canvas.height = window.innerHeight; }
            initHearts() {
                this.hearts = [];
                for (let i = 0; i < 15; i++) {
                    this.hearts.push({
                        x: Math.random() * this.canvas.width, y: Math.random() * this.canvas.height,
                        size: Math.random() * 20 + 15,
                        speedX: (Math.random() - 0.5) * 0.5, speedY: Math.random() * 0.3 + 0.1,
                        opacity: Math.random() * 0.4 + 0.1,
                        wobbleSpeed: Math.random() * 0.02 + 0.01,
                        wobblePhase: Math.random() * Math.PI * 2
                    });
                }
            }
            drawHeart(x, y, size, alpha) {
                this.ctx.save(); this.ctx.translate(x, y); this.ctx.scale(size / 20, size / 20);
                this.ctx.beginPath();
                this.ctx.moveTo(10, 10);
                this.ctx.bezierCurveTo(10, 0, 0, 0, 0, 10);
                this.ctx.bezierCurveTo(0, 15, 5, 18, 10, 20);
                this.ctx.bezierCurveTo(15, 18, 20, 15, 20, 10);
                this.ctx.bezierCurveTo(20, 0, 10, 0, 10, 10);
                const gradient = this.ctx.createRadialGradient(10, 10, 0, 10, 10, 15);
                gradient.addColorStop(0, `rgba(255,107,157,${alpha})`);
                gradient.addColorStop(1, 'rgba(255,107,157,0)');
                this.ctx.fillStyle = gradient; this.ctx.fill(); this.ctx.restore();
            }
            animate() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                this.hearts.forEach(heart => {
                    heart.wobblePhase += heart.wobbleSpeed;
                    const wobble = Math.sin(heart.wobblePhase) * 2;
                    heart.x += heart.speedX + wobble * 0.1;
                    heart.y -= heart.speedY;
                    if (heart.x < -heart.size || heart.x > this.canvas.width + heart.size) heart.speedX *= -1;
                    if (heart.y < -heart.size) { heart.y = this.canvas.height + heart.size; heart.x = Math.random() * this.canvas.width; }
                    this.drawHeart(heart.x, heart.y, heart.size, heart.opacity);
                });
                requestAnimationFrame(() => this.animate());
            }
        }

        // 烟花粒子效果
        class Fireworks {
            constructor(canvas) {
                this.canvas = canvas; this.ctx = canvas.getContext('2d');
                this.particles = []; this.resize();
            }
            resize() { this.canvas.width = window.innerWidth; this.canvas.height = window.innerHeight; }
            createExplosion(x, y) {
                const colors = ['#ff6b9d', '#ff8fab', '#f472b6', '#c084fc', '#a78bfa', '#818cf8', '#60a5fa', '#38bdf8', '#ffd700', '#fbbf24'];
                for (let i = 0; i < 100; i++) {
                    const angle = (Math.PI * 2 * i) / 100;
                    const speed = Math.random() * 5 + 3;
                    const color = colors[Math.floor(Math.random() * colors.length)];
                    this.particles.push({
                        x: x, y: y,
                        vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
                        gravity: 0.15, size: Math.random() * 6 + 3,
                        color: color, alpha: 1, decay: Math.random() * 0.02 + 0.01
                    });
                }
                this.canvas.style.display = 'block';
                this.animate();
            }
            animate() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                let active = false;
                this.particles.forEach((p, i) => {
                    p.vy += p.gravity; p.x += p.vx; p.y += p.vy;
                    p.vx *= 0.98; p.vy *= 0.98; p.alpha -= p.decay;
                    if (p.alpha > 0) {
                        active = true;
                        this.ctx.save(); this.ctx.globalAlpha = p.alpha;
                        this.ctx.beginPath();
                        this.ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                        this.ctx.fillStyle = p.color; this.ctx.fill();
                        const gradient = this.ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size * 2);
                        gradient.addColorStop(0, p.color); gradient.addColorStop(1, 'transparent');
                        this.ctx.fillStyle = gradient;
                        this.ctx.beginPath(); this.ctx.arc(p.x, p.y, p.size * 2, 0, Math.PI * 2);
                        this.ctx.fill(); this.ctx.restore();
                    } else this.particles.splice(i, 1);
                });
                if (active) requestAnimationFrame(() => this.animate());
            }
        }

        // 玫瑰花瓣飘落
        function createPetals(count = 50) {
            for (let i = 0; i < count; i++) {
                setTimeout(() => {
                    const petal = document.createElement('div');
                    petal.className = 'petal';
                    petal.style.left = Math.random() * 100 + 'vw';
                    petal.style.top = '-30px';
                    petal.style.animation = `petalFall ${Math.random() * 4 + 6}s linear forwards`;
                    petal.style.transform = `rotate(${Math.random() * 360}deg)`;
                    petal.style.animationDelay = Math.random() * 0.5 + 's';
                    document.body.appendChild(petal);
                    setTimeout(() => petal.remove(), 10000);
                }, i * 150);
            }
        }

        // 播放音效
        function playSound() {
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                oscillator.frequency.setValueAtTime(800, audioContext.currentTime);
                oscillator.frequency.setValueAtTime(1000, audioContext.currentTime + 0.1);
                oscillator.frequency.setValueAtTime(1200, audioContext.currentTime + 0.2);
                gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                gainNode.gain.exponentialDecayTo ? gainNode.gain.exponentialDecayTo(0.01, audioContext.currentTime + 0.5) : 
                    gainNode.gain.setValueAtTime(0.01, audioContext.currentTime + 0.5);
                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + 0.5);
            } catch (e) {
                if ('vibrate' in navigator) navigator.vibrate([100, 50, 100]);
            }
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            const starsCanvas = document.getElementById('starsCanvas');
            const heartsCanvas = document.getElementById('heartsCanvas');
            const fireworksCanvas = document.getElementById('fireworksCanvas');
            
            const starField = new StarField(starsCanvas);
            const heartBubbles = new HeartBubbles(heartsCanvas);
            const fireworks = new Fireworks(fireworksCanvas);
            
            const nameInput = document.getElementById('nameInput');
            const nameDisplay = document.getElementById('nameDisplay');
            const acceptBtn = document.getElementById('acceptBtn');
            const thinkBtn = document.getElementById('thinkBtn');
            const coquetryText = document.getElementById('coquetryText');
            const successOverlay = document.getElementById('successOverlay');
            const daysCount = document.getElementById('daysCount');
            
            // 随机天数
            daysCount.textContent = Math.floor(Math.random() * 365) + 1;
            
            // 名字输入
            nameInput.addEventListener('input', (e) => {
                nameDisplay.textContent = e.target.value || 'XXX';
            });
            
            // 鼠标移动视差
            document.addEventListener('mousemove', (e) => {
                starField.setMousePosition(e.clientX, e.clientY);
            });
            
            // 触摸移动视差
            document.addEventListener('touchmove', (e) => {
                const touch = e.touches[0];
                starField.setMousePosition(touch.clientX, touch.clientY);
            });
            
            // 窗口大小调整
            window.addEventListener('resize', () => {
                starField.resize();
                heartBubbles.resize();
                fireworks.resize();
            });
            
            // "我愿意"按钮
            acceptBtn.addEventListener('click', () => {
                playSound();
                fireworks.createExplosion(window.innerWidth / 2, window.innerHeight / 2);
                setTimeout(() => fireworks.createExplosion(Math.random() * window.innerWidth, Math.random() * window.innerHeight), 200);
                setTimeout(() => fireworks.createExplosion(Math.random() * window.innerWidth, Math.random() * window.innerHeight), 400);
                createPetals();
                successOverlay.classList.add('show');
            });
            
            // "再想想"按钮 - 害羞躲避效果
            let escapeCount = 0;
            thinkBtn.addEventListener('mouseenter', (e) => {
                if (escapeCount >= 3) return;
                
                const btn = e.target;
                const container = btn.parentElement;
                const rect = container.getBoundingClientRect();
                const btnRect = btn.getBoundingClientRect();
                
                const maxX = rect.width - btnRect.width - 20;
                const maxY = rect.height - btnRect.height - 20;
                
                const newX = Math.random() * maxX;
                const newY = Math.random() * maxY;
                
                btn.style.position = 'relative';
                btn.style.left = newX + 'px';
                btn.style.top = newY + 'px';
                
                escapeCount++;
                coquetryText.classList.add('show');
                
                if (escapeCount >= 3) {
                    setTimeout(() => {
                        btn.style.left = '';
                        btn.style.top = '';
                        escapeCount = 0;
                        coquetryText.classList.remove('show');
                    }, 2000);
                }
            });
            
            thinkBtn.addEventListener('click', () => {
                coquetryText.classList.add('show');
                setTimeout(() => coquetryText.classList.remove('show'), 2000);
            });
        });
    </script>
</body>
</html>
