<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💕 爱的旅程 💕</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 50%, #0a1a2e 100%);
            overflow: hidden;
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            color: #fff;
        }
        #starsCanvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            pointer-events: none; z-index: 0;
        }

        /* 通用页面容器 */
        .page {
            position: relative; z-index: 10;
            width: 100%; height: 100vh;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            padding: 20px;
            display: none;
        }
        .page.active { display: flex; }

        /* 毛玻璃卡片 */
        .glass-card {
            width: 90%; max-width: 500px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 40px rgba(255, 100, 200, 0.3), 0 0 80px rgba(150, 100, 255, 0.2);
            text-align: center;
        }
        .glass-card::before {
            content: ''; position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px;
            border-radius: 26px;
            background: linear-gradient(45deg, #ff6b9d, #c084fc, #60a5fa, #ff6b9d);
            background-size: 400% 400%; z-index: -1;
            animation: borderGlow 4s ease infinite; opacity: 0.7;
        }
        @keyframes borderGlow { 0%,100%{background-position:0% 50%;} 50%{background-position:100% 50%;} }

        /* 标题 */
        .title {
            font-size: 28px; font-weight: bold;
            background: linear-gradient(135deg, #ffc0cb, #e0aaff, #c4b5fd);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }
        .subtitle {
            font-size: 16px; color: rgba(255,255,255,0.7); margin-bottom: 30px;
        }

        /* 输入框 */
        .name-input {
            width: 250px; padding: 15px 25px;
            border: 2px solid rgba(255, 100, 200, 0.5); border-radius: 40px;
            background: rgba(255, 255, 255, 0.1); color: #fff; font-size: 18px;
            text-align: center; outline: none;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }
        .name-input:focus {
            border-color: #ff6b9d;
            box-shadow: 0 0 20px rgba(255, 100, 200, 0.4);
        }
        .name-input::placeholder { color: rgba(255,255,255,0.4); }

        /* 按钮 */
        .btn {
            padding: 16px 40px; font-size: 18px; font-weight: bold;
            border: none; border-radius: 40px; cursor: pointer;
            transition: all 0.3s ease;
            background: linear-gradient(135deg, #ff6b9d, #ff8fab);
            color: #fff;
            box-shadow: 0 4px 20px rgba(255, 107, 157, 0.5);
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(255, 107, 157, 0.7);
        }

        /* 进度条 */
        .progress-bar {
            width: 100%; height: 8px;
            background: rgba(255,255,255,0.2);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff6b9d, #c084fc);
            border-radius: 4px;
            transition: width 0.5s ease;
        }

        /* 贪吃蛇游戏 */
        #snakeGame {
            background: rgba(0,0,0,0.5);
            border: 2px solid rgba(255,100,200,0.5);
            border-radius: 12px;
        }
        .game-info {
            display: flex; justify-content: space-between;
            margin-bottom: 15px;
            font-size: 16px;
        }
        .game-score, .game-level {
            color: #ffd700;
        }

        /* 连连看游戏 */
        #linkGame {
            background: rgba(0,0,0,0.5);
            border: 2px solid rgba(255,100,200,0.5);
            border-radius: 12px;
        }

        /* 表白信 */
        .letter-container {
            max-height: 70vh;
            overflow-y: auto;
            text-align: left;
            line-height: 2;
            color: rgba(255,255,255,0.9);
        }
        .letter-title {
            text-align: center;
            font-size: 24px;
            color: #ffd700;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .letter-content {
            font-size: 15px;
            white-space: pre-line;
        }

        /* 烟花效果 */
        #fireworksCanvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 100; display: none;
        }

        /* 移动端适配 */
        @media (max-width: 600px) {
            .title { font-size: 22px; }
            .glass-card { padding: 20px 15px; width: 95%; }
            .name-input { width: 180px; padding: 12px 15px; font-size: 16px; }
            .btn { padding: 14px 28px; font-size: 16px; }
            #snakeGame, #linkGame { width: 100%; max-width: 320px; height: auto; }
            .letter-container { max-height: 60vh; }
            .letter-title { font-size: 20px; }
            .letter-content { font-size: 14px; }
        }

        /* 触摸控制按钮 */
        .touch-controls {
            display: none;
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
        }
        .touch-pad {
            width: 200px;
            height: 200px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 5px;
        }
        .touch-btn {
            background: rgba(255, 100, 200, 0.3);
            border: 2px solid rgba(255, 100, 200, 0.6);
            border-radius: 12px;
            font-size: 24px;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .touch-btn:hover, .touch-btn:active {
            background: rgba(255, 100, 200, 0.6);
            transform: scale(0.95);
        }
        .touch-btn.center {
            background: transparent;
            border: none;
            cursor: default;
        }
        .touch-btn.center:hover {
            transform: none;
        }

        @media (max-width: 600px) {
            .touch-controls { display: block; }
        }
    </style>
</head>
<body>
    <canvas id="starsCanvas"></canvas>
    <canvas id="fireworksCanvas"></canvas>

    <!-- 页面1：输入名字 -->
    <div class="page active" id="page1">
        <div class="glass-card" style="position: relative;">
            <div class="progress-bar">
                <div class="progress-fill" style="width: 0%;"></div>
            </div>
            <h1 class="title">💕 爱的旅程开始 💕</h1>
            <p class="subtitle">请输入您的名字，开启这段浪漫之旅</p>
            <input type="text" class="name-input" id="nameInput" placeholder="请输入名字" maxlength="10" />
            <div style="height: 20px;" id="nameError"></div>
            <button class="btn" onclick="startJourney()">开始冒险 ❤️</button>
        </div>
    </div>

    <!-- 页面2：贪吃蛇游戏 -->
    <div class="page" id="page2">
        <div class="glass-card" style="position: relative;">
            <div class="progress-bar">
                <div class="progress-fill" style="width: 33%;"></div>
            </div>
            <h1 class="title">🐍 第一关：贪吃蛇大作战</h1>
            <p class="subtitle">帮助小蛇吃到20个爱心，通过第一关！</p>
            <div class="game-info">
                <span>得分: <span class="game-score" id="snakeScore">0</span></span>
                <span>关卡: <span class="game-level" id="snakeLevel">1</span></span>
            </div>
            <canvas id="snakeGame" width="320" height="320"></canvas>
            <p style="margin-top: 15px; font-size: 14px; color: rgba(255,255,255,0.6);">
                使用 ↑ ↓ ← → 或 WASD 控制方向
            </p>
        </div>
    </div>

    <!-- 触摸控制按钮 -->
    <div class="touch-controls" id="touchControls">
        <div class="touch-pad">
            <div></div>
            <div class="touch-btn" onclick="snakeMove('up')">↑</div>
            <div></div>
            <div class="touch-btn" onclick="snakeMove('left')">←</div>
            <div class="touch-btn center"></div>
            <div class="touch-btn" onclick="snakeMove('right')">→</div>
            <div></div>
            <div class="touch-btn" onclick="snakeMove('down')">↓</div>
            <div></div>
        </div>
    </div>

    <!-- 页面3：连连看游戏 -->
    <div class="page" id="page3">
        <div class="glass-card" style="position: relative;">
            <div class="progress-bar">
                <div class="progress-fill" style="width: 66%;"></div>
            </div>
            <h1 class="title">🎮 第二关：心心相印</h1>
            <p class="subtitle">消除所有爱心，通过第二关！</p>
            <div class="game-info">
                <span>剩余: <span class="game-score" id="linkScore">36</span></span>
            </div>
            <canvas id="linkGame" width="320" height="320"></canvas>
            <p style="margin-top: 15px; font-size: 14px; color: rgba(255,255,255,0.6);">
                💡 游戏规则：点击两个相同的爱心图案，如果它们之间可以用不超过两条线连接，就能消除！全部消除即可过关~
            </p>
        </div>
    </div>

    <!-- 页面4：表白信 -->
    <div class="page" id="page4">
        <div class="glass-card" style="position: relative; max-height: 85vh;">
            <div class="progress-bar">
                <div class="progress-fill" style="width: 100%;"></div>
            </div>
            <div class="letter-container">
                <div class="letter-title">💕 给<span id="letterName">XXX</span>先生的一封信 💕</div>
                <div class="letter-content" id="letterContent"></div>
            </div>
        </div>
    </div>

    <script>
        // 星空背景
        class StarField {
            constructor(canvas) {
                this.canvas = canvas; this.ctx = canvas.getContext('2d');
                this.stars = []; this.resize(); this.initStars(); this.animate();
            }
            resize() { this.canvas.width = window.innerWidth; this.canvas.height = window.innerHeight; }
            initStars() {
                this.stars = [];
                const starCount = Math.floor((this.canvas.width * this.canvas.height) / 3000);
                for (let i = 0; i < starCount; i++) {
                    this.stars.push({
                        x: Math.random() * this.canvas.width, y: Math.random() * this.canvas.height,
                        radius: Math.random() * 2 + 0.5, speed: Math.random() * 0.3 + 0.1,
                        twinkleSpeed: Math.random() * 0.02 + 0.01,
                        twinklePhase: Math.random() * Math.PI * 2
                    });
                }
            }
            animate() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                this.stars.forEach(star => {
                    star.twinklePhase += star.twinkleSpeed;
                    const alpha = (Math.sin(star.twinklePhase) * 0.3 + 0.7) * 0.8;
                    this.ctx.beginPath();
                    this.ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
                    this.ctx.fillStyle = `rgba(255,255,255,${alpha})`;
                    this.ctx.fill();
                    star.y -= star.speed;
                    if (star.y < -star.radius) { star.y = this.canvas.height + star.radius; star.x = Math.random() * this.canvas.width; }
                });
                requestAnimationFrame(() => this.animate());
            }
        }

        // 烟花效果
        class Fireworks {
            constructor(canvas) {
                this.canvas = canvas; this.ctx = canvas.getContext('2d');
                this.particles = []; this.resize();
            }
            resize() { this.canvas.width = window.innerWidth; this.canvas.height = window.innerHeight; }
            createExplosion(x, y) {
                const colors = ['#ff6b9d', '#ff8fab', '#c084fc', '#a78bfa', '#ffd700'];
                for (let i = 0; i < 80; i++) {
                    const angle = (Math.PI * 2 * i) / 80;
                    const speed = Math.random() * 4 + 2;
                    const color = colors[Math.floor(Math.random() * colors.length)];
                    this.particles.push({
                        x: x, y: y,
                        vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
                        gravity: 0.12, size: Math.random() * 5 + 2,
                        color: color, alpha: 1, decay: Math.random() * 0.02 + 0.01
                    });
                }
                this.canvas.style.display = 'block';
                this.animate();
            }
            animate() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                let active = false;
                this.particles.forEach((p, i) => {
                    p.vy += p.gravity; p.x += p.vx; p.y += p.vy;
                    p.vx *= 0.98; p.vy *= 0.98; p.alpha -= p.decay;
                    if (p.alpha > 0) {
                        active = true;
                        this.ctx.globalAlpha = p.alpha;
                        this.ctx.beginPath();
                        this.ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                        this.ctx.fillStyle = p.color;
                        this.ctx.fill();
                    } else this.particles.splice(i, 1);
                });
                if (active) requestAnimationFrame(() => this.animate());
            }
        }

        // 全局变量
        let userName = '';
        const fireworks = new Fireworks(document.getElementById('fireworksCanvas'));
        let snakeDx = 1, snakeDy = 0; // 贪吃蛇方向（用于触摸控制）

        // 开始旅程
        function startJourney() {
            const input = document.getElementById('nameInput');
            const error = document.getElementById('nameError');
            
            if (input.value.trim()) {
                userName = input.value.trim();
                error.innerHTML = '';
                showPage('page2');
                initSnakeGame();
            } else {
                error.innerHTML = '<span style="color: #ff6b9d;">请输入名字哦~</span>';
            }
        }

        // 切换页面
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }

        // 贪吃蛇游戏
        function initSnakeGame() {
            const canvas = document.getElementById('snakeGame');
            const ctx = canvas.getContext('2d');
            const gridSize = 20;
            const tileCount = canvas.width / gridSize;
            
            let snake = [{x: 10, y: 10}];
            let food = {x: 15, y: 10};
            snakeDx = 1; snakeDy = 0; // 初始化方向
            let score = 0;
            let level = 1;
            let gameLoop;

            function draw() {
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // 绘制网格
                ctx.strokeStyle = 'rgba(255,100,200,0.1)';
                for (let i = 0; i <= tileCount; i++) {
                    ctx.beginPath(); ctx.moveTo(i * gridSize, 0); ctx.lineTo(i * gridSize, canvas.height); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(0, i * gridSize); ctx.lineTo(canvas.width, i * gridSize); ctx.stroke();
                }

                // 绘制食物（爱心）
                drawHeart(food.x * gridSize + gridSize/2, food.y * gridSize + gridSize/2, gridSize/2, '#ff6b9d');

                // 绘制蛇
                snake.forEach((segment, i) => {
                    const gradient = ctx.createRadialGradient(
                        segment.x * gridSize + gridSize/2, segment.y * gridSize + gridSize/2, 0,
                        segment.x * gridSize + gridSize/2, segment.y * gridSize + gridSize/2, gridSize/2
                    );
                    gradient.addColorStop(0, i === 0 ? '#ffd700' : '#c084fc');
                    gradient.addColorStop(1, i === 0 ? '#ffb700' : '#a78bfa');
                    ctx.fillStyle = gradient;
                    ctx.beginPath();
                    ctx.roundRect(segment.x * gridSize + 2, segment.y * gridSize + 2, gridSize - 4, gridSize - 4, 6);
                    ctx.fill();
                });
            }

            function drawHeart(x, y, size, color) {
                ctx.save(); ctx.translate(x, y); ctx.scale(size / 20, size / 20);
                ctx.beginPath();
                ctx.moveTo(10, 10);
                ctx.bezierCurveTo(10, 0, 0, 0, 0, 10);
                ctx.bezierCurveTo(0, 15, 5, 18, 10, 20);
                ctx.bezierCurveTo(15, 18, 20, 15, 20, 10);
                ctx.bezierCurveTo(20, 0, 10, 0, 10, 10);
                ctx.fillStyle = color; ctx.fill(); ctx.restore();
            }

            function move() {
                const head = {x: snake[0].x + snakeDx, y: snake[0].y + snakeDy};
                
                // 边界检测
                if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                    resetGame(); return;
                }
                
                // 自身碰撞
                if (snake.some(s => s.x === head.x && s.y === head.y)) {
                    resetGame(); return;
                }

                snake.unshift(head);

                // 吃食物
                if (head.x === food.x && head.y === food.y) {
                    score += 10;
                    document.getElementById('snakeScore').textContent = score;
                    spawnFood();
                    
                    // 升级检测
                    if (score >= 20 && level === 1) {
                        level = 2;
                        document.getElementById('snakeLevel').textContent = level;
                        alert('🎉 恭喜通过第一关！即将进入第二关！');
                        setTimeout(() => {
                            clearInterval(gameLoop);
                            document.getElementById('touchControls').style.display = 'none';
                            showPage('page3');
                            initLinkGame();
                        }, 1000);
                        return;
                    }
                } else {
                    snake.pop();
                }
            }

            function spawnFood() {
                food = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
                if (snake.some(s => s.x === food.x && s.y === food.y)) spawnFood();
            }

            function resetGame() {
                snake = [{x: 10, y: 10}];
                food = {x: 15, y: 10};
                dx = 1; dy = 0;
                score = 0;
                level = 1;
                document.getElementById('snakeScore').textContent = score;
                document.getElementById('snakeLevel').textContent = level;
            }

            function game() { move(); draw(); }

            // 键盘控制
            document.addEventListener('keydown', (e) => {
                if ((e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') && snakeDy !== 1) { snakeDx = 0; snakeDy = -1; }
                if ((e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') && snakeDy !== -1) { snakeDx = 0; snakeDy = 1; }
                if ((e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') && snakeDx !== 1) { snakeDx = -1; snakeDy = 0; }
                if ((e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') && snakeDx !== -1) { snakeDx = 1; snakeDy = 0; }
            });

            // 显示触摸控制按钮
            document.getElementById('touchControls').style.display = 'block';

            gameLoop = setInterval(game, 250);
        }

        // 触摸控制贪吃蛇移动
        function snakeMove(direction) {
            switch(direction) {
                case 'up': if (snakeDy !== 1) { snakeDx = 0; snakeDy = -1; } break;
                case 'down': if (snakeDy !== -1) { snakeDx = 0; snakeDy = 1; } break;
                case 'left': if (snakeDx !== 1) { snakeDx = -1; snakeDy = 0; } break;
                case 'right': if (snakeDx !== -1) { snakeDx = 1; snakeDy = 0; } break;
            }
        }

        // 连连看游戏
        function initLinkGame() {
            const canvas = document.getElementById('linkGame');
            const ctx = canvas.getContext('2d');
            const gridSize = 40;
            const cols = 8, rows = 6;
            const totalPairs = (cols * rows) / 2;
            
            let board = [];
            let selected = [];
            let matched = 0;
            let heartTypes = ['❤️', '❤️', '💗', '💗', '💖', '💖', '💕', '💕', '💝', '💝', '💞', '💞', '💘', '💘', '💓', '💓', '💟', '💟'];

            function initBoard() {
                board = [];
                const pairs = [];
                for (let i = 0; i < totalPairs; i++) {
                    pairs.push(i, i);
                }
                // 洗牌
                for (let i = pairs.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [pairs[i], pairs[j]] = [pairs[j], pairs[i]];
                }
                for (let r = 0; r < rows; r++) {
                    board[r] = [];
                    for (let c = 0; c < cols; c++) {
                        board[r][c] = { type: pairs[r * cols + c], matched: false };
                    }
                }
            }

            function draw() {
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        const x = c * gridSize;
                        const y = r * gridSize;
                        
                        if (board[r][c].matched) {
                            ctx.fillStyle = 'rgba(0,0,0,0.3)';
                            ctx.fillRect(x + 2, y + 2, gridSize - 4, gridSize - 4);
                        } else {
                            const isSelected = selected.some(s => s.r === r && s.c === c);
                            ctx.fillStyle = isSelected ? 'rgba(255,215,0,0.3)' : 'rgba(255,100,200,0.2)';
                            ctx.fillRect(x + 2, y + 2, gridSize - 4, gridSize - 4);
                            
                            ctx.font = '24px Arial';
                            ctx.textAlign = 'center';
                            ctx.textBaseline = 'middle';
                            ctx.fillText(heartTypes[board[r][c].type], x + gridSize/2, y + gridSize/2);
                        }
                    }
                }
            }

            function canLink(r1, c1, r2, c2) {
                if (r1 === r2 && c1 === c2) return false;
                if (board[r1][c1].type !== board[r2][c2].type) return false;
                
                // 直线连接
                if (r1 === r2) {
                    let minC = Math.min(c1, c2), maxC = Math.max(c1, c2);
                    let canPass = true;
                    for (let c = minC + 1; c < maxC; c++) {
                        if (!board[r1][c].matched) { canPass = false; break; }
                    }
                    if (canPass) return true;
                }
                if (c1 === c2) {
                    let minR = Math.min(r1, r2), maxR = Math.max(r1, r2);
                    let canPass = true;
                    for (let r = minR + 1; r < maxR; r++) {
                        if (!board[r][c1].matched) { canPass = false; break; }
                    }
                    if (canPass) return true;
                }

                // 一次转折
                if (checkCorner(r1, c1, r1, c2, r2, c2)) return true;
                if (checkCorner(r1, c1, r2, c1, r2, c2)) return true;

                // 二次转折
                for (let c = -1; c <= cols; c++) {
                    if (checkCorner(r1, c1, r1, c, r2, c) && checkCorner(r2, c, r2, c2, r2, c2)) return true;
                }
                for (let r = -1; r <= rows; r++) {
                    if (checkCorner(r1, c1, r, c1, r, c2) && checkCorner(r, c2, r2, c2, r2, c2)) return true;
                }

                return false;
            }

            function checkCorner(r1, c1, r2, c2, r3, c3) {
                if ((r1 === r2 && c2 === c3) || (r2 === r3 && c1 === c2)) {
                    const isEmpty1 = (r2 < 0 || r2 >= rows || c2 < 0 || c2 >= cols) || board[r2][c2].matched;
                    const isEmpty2 = (r3 < 0 || r3 >= rows || c3 < 0 || c3 >= cols) || board[r3][c3].matched;
                    return isEmpty1 && isEmpty2;
                }
                return false;
            }

            function handleClick(e) {
                const rect = canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const c = Math.floor(x / gridSize);
                const r = Math.floor(y / gridSize);

                if (r < 0 || r >= rows || c < 0 || c >= cols) return;
                if (board[r][c].matched) return;

                const alreadySelected = selected.some(s => s.r === r && s.c === c);
                if (alreadySelected) return;

                selected.push({ r, c });

                if (selected.length === 2) {
                    const [first, second] = selected;
                    if (canLink(first.r, first.c, second.r, second.c)) {
                        board[first.r][first.c].matched = true;
                        board[second.r][second.c].matched = true;
                        matched++;
                        document.getElementById('linkScore').textContent = (cols * rows) - matched * 2;
                        
                        if (matched === totalPairs) {
                            setTimeout(() => {
                                alert('🎉 恭喜通过第二关！即将揭晓最终惊喜！');
                                showPage('page4');
                                showLetter();
                                fireworks.createExplosion(window.innerWidth/2, window.innerHeight/2);
                                setTimeout(() => fireworks.createExplosion(Math.random()*window.innerWidth, Math.random()*window.innerHeight), 200);
                            }, 500);
                        }
                    }
                    selected = [];
                }

                draw();
            }

            initBoard();
            draw();
            canvas.addEventListener('click', handleClick);
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            new StarField(document.getElementById('starsCanvas'));
            window.addEventListener('resize', () => {
                fireworks.resize();
            });
        });
    </script>
