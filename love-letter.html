<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💕 爱的旅程 💕</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 50%, #0a1a2e 100%);
            overflow: hidden;
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            color: #fff;
        }
        #starsCanvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            pointer-events: none; z-index: 0;
        }

        /* 通用页面容器 */
        .page {
            position: relative; z-index: 10;
            width: 100%; height: 100vh;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            padding: 20px;
            display: none;
        }
        .page.active { display: flex; }

        /* 毛玻璃卡片 */
        .glass-card {
            width: 90%; max-width: 500px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 40px rgba(255, 100, 200, 0.3), 0 0 80px rgba(150, 100, 255, 0.2);
            text-align: center;
        }
        .glass-card::before {
            content: ''; position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px;
            border-radius: 26px;
            background: linear-gradient(45deg, #ff6b9d, #c084fc, #60a5fa, #ff6b9d);
            background-size: 400% 400%; z-index: -1;
            animation: borderGlow 4s ease infinite; opacity: 0.7;
        }
        @keyframes borderGlow { 0%,100%{background-position:0% 50%;} 50%{background-position:100% 50%;} }

        /* 标题 */
        .title {
            font-size: 28px; font-weight: bold;
            background: linear-gradient(135deg, #ffc0cb, #e0aaff, #c4b5fd);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }
        .subtitle {
            font-size: 16px; color: rgba(255,255,255,0.7); margin-bottom: 30px;
        }

        /* 输入框 */
        .name-input {
            width: 250px; padding: 15px 25px;
            border: 2px solid rgba(255, 100, 200, 0.5); border-radius: 40px;
            background: rgba(255, 255, 255, 0.1); color: #fff; font-size: 18px;
            text-align: center; outline: none;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }
        .name-input:focus {
            border-color: #ff6b9d;
            box-shadow: 0 0 20px rgba(255, 100, 200, 0.4);
        }
        .name-input::placeholder { color: rgba(255,255,255,0.4); }

        /* 按钮 */
        .btn {
            padding: 16px 40px; font-size: 18px; font-weight: bold;
            border: none; border-radius: 40px; cursor: pointer;
            transition: all 0.3s ease;
            background: linear-gradient(135deg, #ff6b9d, #ff8fab);
            color: #fff;
            box-shadow: 0 4px 20px rgba(255, 107, 157, 0.5);
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(255, 107, 157, 0.7);
        }

        /* 进度条 */
        .progress-bar {
            width: 100%; height: 8px;
            background: rgba(255,255,255,0.2);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff6b9d, #c084fc);
            border-radius: 4px;
            transition: width 0.5s ease;
        }

        /* 贪吃蛇游戏 */
        #snakeGame {
            background: rgba(0,0,0,0.5);
            border: 2px solid rgba(255,100,200,0.5);
            border-radius: 12px;
        }
        .game-info {
            display: flex; justify-content: space-between;
            margin-bottom: 15px;
            font-size: 16px;
        }
        .game-score, .game-level {
            color: #ffd700;
        }

        /* 连连看游戏 */
        #linkGame {
            background: rgba(0,0,0,0.5);
            border: 2px solid rgba(255,100,200,0.5);
            border-radius: 12px;
        }

        /* 表白信 */
        .letter-container {
            max-height: 70vh;
            overflow-y: auto;
            text-align: left;
            line-height: 2;
            color: rgba(255,255,255,0.9);
        }
        .letter-title {
            text-align: center;
            font-size: 24px;
            color: #ffd700;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .letter-content {
            font-size: 15px;
            white-space: pre-line;
        }

        /* 烟花效果 */
        #fireworksCanvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 100; display: none;
        }

        /* 移动端适配 */
        @media (max-width: 600px) {
            .title { font-size: 22px; }
            .glass-card { padding: 20px 15px; width: 95%; }
            .name-input { width: 180px; padding: 12px 15px; font-size: 16px; }
            .btn { padding: 14px 28px; font-size: 16px; }
            #snakeGame, #linkGame { width: 100%; max-width: 320px; height: auto; }
            .letter-container { max-height: 60vh; }
            .letter-title { font-size: 20px; }
            .letter-content { font-size: 14px; }
        }

        /* 触摸控制按钮 */
        .touch-controls {
            display: none;
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
        }
        .touch-pad {
            width: 200px;
            height: 200px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 5px;
        }
        .touch-btn {
            background: rgba(255, 100, 200, 0.3);
            border: 2px solid rgba(255, 100, 200, 0.6);
            border-radius: 12px;
            font-size: 24px;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .touch-btn:hover, .touch-btn:active {
            background: rgba(255, 100, 200, 0.6);
            transform: scale(0.95);
        }
        .touch-btn.center {
            background: transparent;
            border: none;
            cursor: default;
        }
        .touch-btn.center:hover {
            transform: none;
        }

        .music-btn {
            background: linear-gradient(135deg, #ff6b9d, #c44569);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(255, 107, 157, 0.4);
        }
        .music-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 107, 157, 0.6);
        }
        
        @media (max-width: 600px) {
            .touch-controls { display: block; }
        }
    </style>
</head>
<body>
    <canvas id="starsCanvas"></canvas>
    <canvas id="fireworksCanvas"></canvas>

    <!-- 页面1：输入名字 -->
    <div class="page active" id="page1">
        <div class="glass-card" style="position: relative;">
            <div class="progress-bar">
                <div class="progress-fill" style="width: 0%;"></div>
            </div>
            <h1 class="title">💕 爱的旅程开始 💕</h1>
            <p class="subtitle">请输入您的名字，开启这段浪漫之旅</p>
            <input type="text" class="name-input" id="nameInput" placeholder="请输入名字" maxlength="10" />
            <div style="height: 20px;" id="nameError"></div>
            <button class="btn" onclick="startJourney()">开始冒险 ❤️</button>
        </div>
    </div>

    <!-- 页面2：贪吃蛇游戏 -->
    <div class="page" id="page2">
        <div class="glass-card" style="position: relative;">
            <div class="progress-bar">
                <div class="progress-fill" style="width: 33%;"></div>
            </div>
            <h1 class="title">🐍 第一关：贪吃蛇大作战</h1>
            <p class="subtitle">帮助小蛇吃到20个爱心，通过第一关！</p>
            <div class="game-info">
                <span>得分: <span class="game-score" id="snakeScore">0</span></span>
                <span>关卡: <span class="game-level" id="snakeLevel">1</span></span>
            </div>
            <canvas id="snakeGame" width="320" height="320"></canvas>
            <p style="margin-top: 15px; font-size: 14px; color: rgba(255,255,255,0.6);">
                使用 ↑ ↓ ← → 或 WASD 控制方向
            </p>
        </div>
    </div>

    <!-- 触摸控制按钮 -->
    <div class="touch-controls" id="touchControls">
        <div class="touch-pad">
            <div></div>
            <div class="touch-btn" onclick="snakeMove('up')">↑</div>
            <div></div>
            <div class="touch-btn" onclick="snakeMove('left')">←</div>
            <div class="touch-btn center"></div>
            <div class="touch-btn" onclick="snakeMove('right')">→</div>
            <div></div>
            <div class="touch-btn" onclick="snakeMove('down')">↓</div>
            <div></div>
        </div>
    </div>

    <!-- 页面3：扫雷游戏 -->
    <div class="page" id="page3">
        <div class="glass-card" style="position: relative;">
            <div class="progress-bar">
                <div class="progress-fill" style="width: 66%;"></div>
            </div>
            <h1 class="title">💣 第二关：爱心扫雷</h1>
            <p class="subtitle">找出所有爱心，避开炸弹！</p>
            <div class="game-info">
                <span>💖 爱心: <span class="game-score" id="mineHearts">10</span></span>
                <span>💣 剩余: <span class="game-level" id="mineRemaining">34</span></span>
            </div>
            <canvas id="mineGame" width="320" height="320"></canvas>
            <p style="margin-top: 15px; font-size: 14px; color: rgba(255,255,255,0.6);">
                💡 游戏规则：点击格子翻开，找出所有爱心获胜！小心炸弹！
            </p>
        </div>
    </div>

    <!-- 页面4：表白信 -->
    <div class="page" id="page4">
        <div class="glass-card" style="position: relative; max-height: 85vh;">
            <div class="progress-bar">
                <div class="progress-fill" style="width: 100%;"></div>
            </div>
            <div class="letter-container">
                <div class="letter-title">💕 给<span id="letterName">XXX</span>先生的一封信 💕</div>
                <div class="letter-content" id="letterContent"></div>
            </div>
            <audio id="backgroundMusic" loop>
                <source src="https://music.163.com/song/media/outer/url?id=1972800112.mp3" type="audio/mpeg">
            </audio>
            <button id="musicToggle" class="music-btn" onclick="toggleMusic()">🎵 播放音乐</button>
        </div>
    </div>

    <script>
        // 星空背景
        class StarField {
            constructor(canvas) {
                this.canvas = canvas; this.ctx = canvas.getContext('2d');
                this.stars = []; this.resize(); this.initStars(); this.animate();
            }
            resize() { this.canvas.width = window.innerWidth; this.canvas.height = window.innerHeight; }
            initStars() {
                this.stars = [];
                const starCount = Math.floor((this.canvas.width * this.canvas.height) / 3000);
                for (let i = 0; i < starCount; i++) {
                    this.stars.push({
                        x: Math.random() * this.canvas.width, y: Math.random() * this.canvas.height,
                        radius: Math.random() * 2 + 0.5, speed: Math.random() * 0.3 + 0.1,
                        twinkleSpeed: Math.random() * 0.02 + 0.01,
                        twinklePhase: Math.random() * Math.PI * 2
                    });
                }
            }
            animate() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                this.stars.forEach(star => {
                    star.twinklePhase += star.twinkleSpeed;
                    const alpha = (Math.sin(star.twinklePhase) * 0.3 + 0.7) * 0.8;
                    this.ctx.beginPath();
                    this.ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
                    this.ctx.fillStyle = `rgba(255,255,255,${alpha})`;
                    this.ctx.fill();
                    star.y -= star.speed;
                    if (star.y < -star.radius) { star.y = this.canvas.height + star.radius; star.x = Math.random() * this.canvas.width; }
                });
                requestAnimationFrame(() => this.animate());
            }
        }

        // 烟花效果
        class Fireworks {
            constructor(canvas) {
                this.canvas = canvas; this.ctx = canvas.getContext('2d');
                this.particles = []; this.resize();
            }
            resize() { this.canvas.width = window.innerWidth; this.canvas.height = window.innerHeight; }
            createExplosion(x, y) {
                const colors = ['#ff6b9d', '#ff8fab', '#c084fc', '#a78bfa', '#ffd700'];
                for (let i = 0; i < 80; i++) {
                    const angle = (Math.PI * 2 * i) / 80;
                    const speed = Math.random() * 4 + 2;
                    const color = colors[Math.floor(Math.random() * colors.length)];
                    this.particles.push({
                        x: x, y: y,
                        vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
                        gravity: 0.12, size: Math.random() * 5 + 2,
                        color: color, alpha: 1, decay: Math.random() * 0.02 + 0.01
                    });
                }
                this.canvas.style.display = 'block';
                this.animate();
            }
            animate() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                let active = false;
                this.particles.forEach((p, i) => {
                    p.vy += p.gravity; p.x += p.vx; p.y += p.vy;
                    p.vx *= 0.98; p.vy *= 0.98; p.alpha -= p.decay;
                    if (p.alpha > 0) {
                        active = true;
                        this.ctx.globalAlpha = p.alpha;
                        this.ctx.beginPath();
                        this.ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                        this.ctx.fillStyle = p.color;
                        this.ctx.fill();
                    } else this.particles.splice(i, 1);
                });
                if (active) requestAnimationFrame(() => this.animate());
            }
        }

        // 全局变量
        let userName = '';
        const fireworks = new Fireworks(document.getElementById('fireworksCanvas'));
        let snakeDx = 1, snakeDy = 0; // 贪吃蛇方向（用于触摸控制）

        // 开始旅程
        function startJourney() {
            const input = document.getElementById('nameInput');
            const error = document.getElementById('nameError');
            
            if (input.value.trim()) {
                userName = input.value.trim();
                error.innerHTML = '';
                showPage('page2');
                initSnakeGame();
            } else {
                error.innerHTML = '<span style="color: #ff6b9d;">请输入名字哦~</span>';
            }
        }

        // 切换页面
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }

        // 贪吃蛇游戏
        function initSnakeGame() {
            const canvas = document.getElementById('snakeGame');
            const ctx = canvas.getContext('2d');
            const gridSize = 20;
            const tileCount = canvas.width / gridSize;
            
            let snake = [{x: 10, y: 10}];
            let food = {x: 15, y: 10};
            snakeDx = 1; snakeDy = 0; // 初始化方向
            let score = 0;
            let level = 1;
            let gameLoop;

            function draw() {
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // 绘制网格
                ctx.strokeStyle = 'rgba(255,100,200,0.1)';
                for (let i = 0; i <= tileCount; i++) {
                    ctx.beginPath(); ctx.moveTo(i * gridSize, 0); ctx.lineTo(i * gridSize, canvas.height); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(0, i * gridSize); ctx.lineTo(canvas.width, i * gridSize); ctx.stroke();
                }

                // 绘制食物（爱心）- 增大爱心尺寸
                drawHeart(food.x * gridSize + gridSize/2, food.y * gridSize + gridSize/2, gridSize * 0.7, '#ff6b9d');

                // 绘制蛇
                snake.forEach((segment, i) => {
                    const gradient = ctx.createRadialGradient(
                        segment.x * gridSize + gridSize/2, segment.y * gridSize + gridSize/2, 0,
                        segment.x * gridSize + gridSize/2, segment.y * gridSize + gridSize/2, gridSize/2
                    );
                    gradient.addColorStop(0, i === 0 ? '#ffd700' : '#c084fc');
                    gradient.addColorStop(1, i === 0 ? '#ffb700' : '#a78bfa');
                    ctx.fillStyle = gradient;
                    ctx.beginPath();
                    ctx.roundRect(segment.x * gridSize + 2, segment.y * gridSize + 2, gridSize - 4, gridSize - 4, 6);
                    ctx.fill();
                });
            }

            function drawHeart(x, y, size, color) {
                ctx.save(); ctx.translate(x, y); ctx.scale(size / 20, size / 20);
                ctx.beginPath();
                ctx.moveTo(10, 10);
                ctx.bezierCurveTo(10, 0, 0, 0, 0, 10);
                ctx.bezierCurveTo(0, 15, 5, 18, 10, 20);
                ctx.bezierCurveTo(15, 18, 20, 15, 20, 10);
                ctx.bezierCurveTo(20, 0, 10, 0, 10, 10);
                ctx.fillStyle = color; ctx.fill(); ctx.restore();
            }

            function move() {
                const head = {x: snake[0].x + snakeDx, y: snake[0].y + snakeDy};
                
                // 边界检测
                if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                    resetGame(); return;
                }
                
                // 自身碰撞
                if (snake.some(s => s.x === head.x && s.y === head.y)) {
                    resetGame(); return;
                }

                snake.unshift(head);

                // 吃食物
                if (head.x === food.x && head.y === food.y) {
                    score += 10;
                    document.getElementById('snakeScore').textContent = score;
                    spawnFood();
                    
                    // 升级检测
                    if (score >= 20 && level === 1) {
                        level = 2;
                        document.getElementById('snakeLevel').textContent = level;
                        alert('🎉 恭喜通过第一关！即将进入第二关！');
                        setTimeout(() => {
                            clearInterval(gameLoop);
                            document.getElementById('touchControls').style.display = 'none';
                            showPage('page3');
                            initMineGame();
                        }, 1000);
                        return;
                    }
                } else {
                    snake.pop();
                }
            }

            function spawnFood() {
                // 确保食物不在边缘，留出2格的距离
                food = {
                    x: 2 + Math.floor(Math.random() * (tileCount - 4)),
                    y: 2 + Math.floor(Math.random() * (tileCount - 4))
                };
                if (snake.some(s => s.x === food.x && s.y === food.y)) spawnFood();
            }

            function resetGame() {
                snake = [{x: 8, y: 8}];
                food = {x: 12, y: 8}; // 初始食物放在中间区域
                snakeDx = 1; snakeDy = 0;
                score = 0;
                level = 1;
                document.getElementById('snakeScore').textContent = score;
                document.getElementById('snakeLevel').textContent = level;
            }

            function game() { move(); draw(); }

            // 键盘控制
            document.addEventListener('keydown', (e) => {
                if ((e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') && snakeDy !== 1) { snakeDx = 0; snakeDy = -1; }
                if ((e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') && snakeDy !== -1) { snakeDx = 0; snakeDy = 1; }
                if ((e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') && snakeDx !== 1) { snakeDx = -1; snakeDy = 0; }
                if ((e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') && snakeDx !== -1) { snakeDx = 1; snakeDy = 0; }
            });

            // 显示触摸控制按钮
            document.getElementById('touchControls').style.display = 'block';

            gameLoop = setInterval(game, 350);
        }

        // 触摸控制贪吃蛇移动
        function snakeMove(direction) {
            switch(direction) {
                case 'up': if (snakeDy !== 1) { snakeDx = 0; snakeDy = -1; } break;
                case 'down': if (snakeDy !== -1) { snakeDx = 0; snakeDy = 1; } break;
                case 'left': if (snakeDx !== 1) { snakeDx = -1; snakeDy = 0; } break;
                case 'right': if (snakeDx !== -1) { snakeDx = 1; snakeDy = 0; } break;
            }
        }

        // 扫雷游戏
        function initMineGame() {
            const canvas = document.getElementById('mineGame');
            const ctx = canvas.getContext('2d');
            const gridSize = 40;
            const cols = 8, rows = 8;
            const totalCells = cols * rows;
            const heartCount = 7; // 爱心数量
            
            let board = [];
            let gameOver = false;
            let heartsFound = 0;
            let remainingCells = totalCells;

            // 初始化游戏板
            function initBoard() {
                board = [];
                gameOver = false;
                heartsFound = 0;
                remainingCells = totalCells;
                
                // 创建空白格子
                for (let r = 0; r < rows; r++) {
                    board[r] = [];
                    for (let c = 0; c < cols; c++) {
                        board[r][c] = { isHeart: false, isMine: false, isRevealed: false, neighborMines: 0 };
                    }
                }
                
                // 随机放置爱心
                let placed = 0;
                while (placed < heartCount) {
                    const r = Math.floor(Math.random() * rows);
                    const c = Math.floor(Math.random() * cols);
                    if (!board[r][c].isHeart && !board[r][c].isMine) {
                        board[r][c].isHeart = true;
                        placed++;
                    }
                }
                
                // 其余都是炸弹
                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        if (!board[r][c].isHeart) {
                            board[r][c].isMine = true;
                        }
                    }
                }
                
                // 计算每个格子周围的炸弹数
                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        if (!board[r][c].isHeart) {
                            let count = 0;
                            for (let dr = -1; dr <= 1; dr++) {
                                for (let dc = -1; dc <= 1; dc++) {
                                    const nr = r + dr;
                                    const nc = c + dc;
                                    if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && board[nr][nc].isMine) {
                                        count++;
                                    }
                                }
                            }
                            board[r][c].neighborMines = count;
                        }
                    }
                }
                
                updateUI();
            }

            function updateUI() {
                document.getElementById('mineHearts').textContent = heartsFound + '/' + heartCount;
                document.getElementById('mineRemaining').textContent = remainingCells;
            }

            // 绘制游戏
            function draw() {
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        const x = c * gridSize;
                        const y = r * gridSize;
                        const cell = board[r][c];
                        
                        if (cell.isRevealed) {
                            // 已翻开的格子
                            ctx.fillStyle = 'rgba(100, 50, 150, 0.3)';
                            ctx.fillRect(x + 1, y + 1, gridSize - 2, gridSize - 2);
                            
                            if (cell.isHeart) {
                                // 爱心
                                ctx.font = '24px Arial';
                                ctx.textAlign = 'center';
                                ctx.textBaseline = 'middle';
                                ctx.fillText('❤️', x + gridSize/2, y + gridSize/2);
                            } else if (cell.isMine) {
                                // 炸弹
                                ctx.font = '24px Arial';
                                ctx.textAlign = 'center';
                                ctx.textBaseline = 'middle';
                                ctx.fillText('💣', x + gridSize/2, y + gridSize/2);
                            } else if (cell.neighborMines > 0) {
                                // 数字提示
                                ctx.font = '20px Arial';
                                ctx.textAlign = 'center';
                                ctx.textBaseline = 'middle';
                                ctx.fillStyle = '#ffd700';
                                ctx.fillText(cell.neighborMines.toString(), x + gridSize/2, y + gridSize/2);
                            }
                        } else {
                            // 未翻开的格子
                            ctx.fillStyle = 'rgba(255, 100, 200, 0.4)';
                            ctx.strokeStyle = 'rgba(255, 100, 200, 0.6)';
                            ctx.lineWidth = 2;
                            ctx.fillRect(x + 2, y + 2, gridSize - 4, gridSize - 4);
                            ctx.strokeRect(x + 2, y + 2, gridSize - 4, gridSize - 4);
                            
                            // 问号提示
                            ctx.font = '20px Arial';
                            ctx.textAlign = 'center';
                            ctx.textBaseline = 'middle';
                            ctx.fillStyle = 'rgba(255,255,255,0.5)';
                            ctx.fillText('?', x + gridSize/2, y + gridSize/2);
                        }
                    }
                }
            }

            // 翻开格子
            function reveal(r, c) {
                if (r < 0 || r >= rows || c < 0 || c >= cols) return;
                if (board[r][c].isRevealed || gameOver) return;
                
                board[r][c].isRevealed = true;
                remainingCells--;
                
                if (board[r][c].isHeart) {
                    // 找到爱心
                    heartsFound++;
                    updateUI();
                    
                    if (heartsFound === heartCount) {
                        // 胜利！
                        gameOver = true;
                        setTimeout(() => {
                            alert('🎉 恭喜通关！找到所有爱心！');
                            showPage('page4');
                            showLetter();
                            fireworks.createExplosion(window.innerWidth/2, window.innerHeight/2);
                            setTimeout(() => fireworks.createExplosion(Math.random()*window.innerWidth, Math.random()*window.innerHeight), 200);
                        }, 500);
                    }
                } else if (board[r][c].isMine) {
                    // 踩到炸弹 - 简单模式：只显示这个炸弹，不重新开始
                    board[r][c].isRevealed = true;
                    remainingCells--;
                    // 显示一下就盖回去，继续游戏
                    setTimeout(() => {
                        board[r][c].isRevealed = false;
                        remainingCells++;
                        draw();
                    }, 300);
                } else if (board[r][c].neighborMines === 0) {
                    // 空白格子，自动翻开周围
                    for (let dr = -1; dr <= 1; dr++) {
                        for (let dc = -1; dc <= 1; dc++) {
                            if (dr !== 0 || dc !== 0) {
                                reveal(r + dr, c + dc);
                            }
                        }
                    }
                }
                
                updateUI();
                draw();
            }

            function handleClick(e) {
                e.preventDefault();
                if (gameOver) return;
                
                let x, y;
                if (e.touches && e.touches.length > 0) {
                    x = e.touches[0].clientX;
                    y = e.touches[0].clientY;
                } else {
                    x = e.clientX;
                    y = e.clientY;
                }
                
                const rect = canvas.getBoundingClientRect();
                const clickX = (x - rect.left) * (canvas.width / rect.width);
                const clickY = (y - rect.top) * (canvas.height / rect.height);
                
                const c = Math.floor(clickX / gridSize);
                const r = Math.floor(clickY / gridSize);
                
                reveal(r, c);
            }

            initBoard();
            draw();
            canvas.addEventListener('click', handleClick);
            canvas.addEventListener('touchstart', handleClick);
        }

        // 显示表白信
        function showLetter() {
            const letterContent = `亲爱的${userName}：

我好像从来不是谁的首选，也没有一个人坚定的选择我。那些看似表面美好，终究只是短暂停靠，从未有人愿意为我卸下防备，坚定地在我身边。

于我而言，认定一个人就只会是他。从小心翼翼的试探开始，刚认识时故作热络，挖空心思找话题接茬，怕空气沉寂，怕彼此疏远。我藏起了真实的自己，我的棱角磨平，情绪...我没有情绪了。

人心是留不住的，关系总会在不知不觉中慢慢冷却。曾经的感觉深刻烙印在我心底，别人说我是个深情专一的女生。我对每一个喜欢的人，都痛的彻底，换了一个人，我还会照旧。

好像总是这样，起雾了，我看不清前方的路了...我无数次思考，是执念太深还是过于喜欢，我找不到答案。

你知道的，我会继续这样，直到有一天，你的脸在我记忆中模糊，直到，我记不起你的名字，直到，我不再留恋你给我的感觉。

最后，祝你早、午、晚都安。`;

            document.getElementById('letterName').textContent = userName;
            document.getElementById('letterContent').textContent = letterContent;
        }

        // 背景音乐控制
        function toggleMusic() {
            const audio = document.getElementById('backgroundMusic');
            const btn = document.getElementById('musicToggle');
            
            if (audio.paused) {
                audio.play().then(() => {
                    btn.innerHTML = '🎵 暂停音乐';
                }).catch(err => {
                    console.log('自动播放被阻止，请手动点击播放');
                });
            } else {
                audio.pause();
                btn.innerHTML = '🎵 播放音乐';
            }
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            new StarField(document.getElementById('starsCanvas'));
            window.addEventListener('resize', () => {
                fireworks.resize();
            });
        });
    </script>
</body>
